<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <!-- Terminal window outline -->
  <rect x="24" y="20" width="352" height="140" rx="4" stroke="#6a6864" stroke-width="1"/>
  <line x1="24" y1="40" x2="376" y2="40" stroke="#6a6864" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="36" cy="30" r="2.2" fill="#6a6864"/>
  <circle cx="44" cy="30" r="2.2" fill="#6a6864"/>
  <circle cx="52" cy="30" r="2.2" fill="#6a6864"/>
  <text x="200" y="34" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">DEBIAN</text>

  <!-- Single prompt with blinking cursor after the command -->
  <text x="40" y="62" font-family="monospace" font-size="12" fill="#6a6864">$</text>
  <text x="56" y="62" font-family="monospace" font-size="12" fill="#a8a6a0">apt install ripgrep</text>
  <rect x="196" y="51" width="8" height="14" fill="#eceae4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
