<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <!-- Host label -->
  <text x="28" y="30" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">HOST</text>

  <!-- Host folder tree -->
  <text x="28" y="52" font-family="monospace" font-size="11" fill="#a8a6a0">~/projects/</text>
  <text x="40" y="70" font-family="monospace" font-size="11" fill="#6a6864">├── src/</text>
  <text x="40" y="86" font-family="monospace" font-size="11" fill="#6a6864">├── Cargo.toml</text>
  <text x="40" y="102" font-family="monospace" font-size="11" fill="#6a6864">└── README.md</text>

  <!-- Sandbox label -->
  <text x="240" y="30" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">SANDBOX</text>

  <!-- Guest /workspace tree -->
  <text x="240" y="52" font-family="monospace" font-size="11" fill="#eceae4">/workspace/</text>
  <text x="252" y="70" font-family="monospace" font-size="11" fill="#a8a6a0">├── src/</text>
  <text x="252" y="86" font-family="monospace" font-size="11" fill="#a8a6a0">├── Cargo.toml</text>
  <text x="252" y="102" font-family="monospace" font-size="11" fill="#a8a6a0">└── README.md</text>

  <!-- Bind mount arrows -->
  <path d="M 150 72 L 232 72" stroke="#eceae4" stroke-width="1"/>
  <polyline points="226 68 232 72 226 76" stroke="#eceae4" stroke-width="1" fill="none"/>
  <path d="M 232 94 L 150 94" stroke="#eceae4" stroke-width="1"/>
  <polyline points="156 90 150 94 156 98" stroke="#eceae4" stroke-width="1" fill="none"/>

  <!-- Animated dot flowing right -->
  <circle cx="150" cy="72" r="2.2" fill="#eceae4">
    <animate attributeName="cx" values="150;232" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <text x="191" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">MOUNT WORKDIR</text>
</svg>
