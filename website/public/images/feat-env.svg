<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none">
  <!-- Labels -->
  <text x="24" y="24" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">HOST</text>
  <text x="376" y="24" text-anchor="end" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">SANDBOX</text>

  <!-- Vertical divider -->
  <line x1="200" y1="34" x2="200" y2="130" stroke="#6a6864" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Host side: .env file -->
  <text x="24" y="52" font-family="monospace" font-size="11" fill="#eceae4">.env</text>
  <text x="24" y="72" font-family="monospace" font-size="10" fill="#a8a6a0">API_KEY=sk-ant-a3...</text>
  <text x="24" y="88" font-family="monospace" font-size="10" fill="#a8a6a0">DB_URL=postgres://...</text>

  <!-- Sandbox side: placeholders -->
  <text x="224" y="52" font-family="monospace" font-size="11" fill="#eceae4">env</text>
  <text x="224" y="72" font-family="monospace" font-size="10" fill="#6a6864">API_KEY=shuru_tok_1</text>
  <text x="224" y="88" font-family="monospace" font-size="10" fill="#6a6864">DB_URL=shuru_tok_2</text>

  <!-- Footer labels -->
  <text x="24" y="112" font-family="monospace" font-size="9" fill="#a8a6a0" letter-spacing="1.2">REAL VALUES</text>
  <text x="224" y="112" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">OPAQUE PLACEHOLDERS</text>
  <text x="200" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a6864" letter-spacing="1.2">PROXY SWAPS ON THE WIRE</text>
</svg>
